name: Hello GitHub Actions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取程式碼
        uses: actions/checkout@v4

      - name: 打招呼
        run: echo "Hello GitHub Actions!"

      - name: 顯示目前時間
        run: date

      - name: 顯示 commit hash
        run: git rev-parse HEAD

      - name: 顯示系統資訊
        run: |
          uname -a
          pwd
