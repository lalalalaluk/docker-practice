<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Docker Nginx Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 64px auto;
      line-height: 1.7;
      color: #111827;
    }
    h1 { color: #0b5cad; }
    .box {
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 20px;
      background: #f6f8fb;
    }
  </style>
</head>
<body>
  <h1>我是 Docker 課程的練習頁面</h1>
  <div class="box">
    <p>這個頁面由 Nginx 容器提供服務。</p>
    <p>HTML 檔案放在本機，透過 Bind Mount 掛載進容器。</p>
  </div>
</body>
</html>
