name: CI/CD with Health Check

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: docker-cicd-demo

jobs:
  test-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝依賴
        run: pip install -r requirements.txt

      - name: 執行測試
        run: pytest test_app.py -v

      - name: Build local image
        run: docker build -t local-test-image .

      - name: Run container
        run: docker run -d --name health-check-app -p 5000:5000 local-test-image

      - name: Wait for app
        run: sleep 5

      - name: Check /health
        run: |
          curl --fail http://localhost:5000/health
          docker logs health-check-app

      - name: Stop test container
        if: always()
        run: docker rm -f health-check-app

      - name: 登入 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build 並 Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
